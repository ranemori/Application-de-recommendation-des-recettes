<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#E8724A" />
    <meta name="description" content="À Ton Goût – Moteur de recommandation de recettes intelligent" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/favicon.png" />
    <title>À Ton Goût</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />

  </head>
  <body>
    <div id="root">
      <div id="initial-splash">
        <div class="splash-bg">
          <span class="splash-emoji splash-emoji--1">🍅</span>
          <span class="splash-emoji splash-emoji--2">🥑</span>
          <span class="splash-emoji splash-emoji--3">🌿</span>
          <span class="splash-emoji splash-emoji--4">🍋</span>
        </div>
        <div class="splash-card">
          <div class="splash-pan-loader">
            <div class="splash-pan-loader__flip"></div>
            <div class="splash-pan-loader__pan-container">
              <div class="splash-pan-loader__pan"></div>
              <div class="splash-pan-loader__handle"></div>
            </div>
            <div class="splash-pan-loader__shadow"></div>
          </div>
          <h1 class="splash-title">À Ton Goût</h1>
          <p class="splash-text">Préparation de votre expérience culinaire…</p>
        </div>
      </div>
    </div>
    <style>
      #initial-splash {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: linear-gradient(160deg, #FFF3E8 0%, #FDE8DA 45%, #F7D9C4 100%);
        font-family: 'Inter', sans-serif; overflow: hidden; z-index: 9999;
      }
      .splash-bg { position: absolute; inset: 0; pointer-events: none; }
      .splash-emoji {
        position: absolute; font-size: 2.4rem; opacity: .55;
        animation: splash-float 4.5s ease-in-out infinite;
      }
      .splash-emoji--1 { top: 14%; left: 12%; animation-delay: 0s; }
      .splash-emoji--2 { top: 70%; left: 18%; animation-delay: .8s; font-size: 2rem; }
      .splash-emoji--3 { top: 20%; left: 82%; animation-delay: 1.6s; font-size: 2.1rem; }
      .splash-emoji--4 { top: 72%; left: 80%; animation-delay: 2.4s; font-size: 2.2rem; }
      @keyframes splash-float {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-18px) rotate(8deg); }
      }

      .splash-card { position: relative; display: flex; flex-direction: column; align-items: center; gap: 1.1rem; }

      .splash-pan-loader { position: relative; width: 110px; height: 110px; }
      .splash-pan-loader__flip {
        position: relative; top: 10%; left: 0; z-index: -1;
        width: 60%; height: 45%;
        border: 8px solid transparent; border-bottom: 8px solid #E8724A;
        border-radius: 50%;
        animation: splash-pan-flip 2s infinite; animation-timing-function: linear;
      }
      .splash-pan-loader__pan-container { display: flex; width: 100%; animation: splash-pan-pan 2s infinite; }
      .splash-pan-loader__pan {
        width: 60%; height: 14px; background: linear-gradient(#2a2a2a, #444);
        border-bottom-right-radius: 14px; border-bottom-left-radius: 14px;
      }
      .splash-pan-loader__handle { width: 40%; height: 7px; background: linear-gradient(#2a2a2a, #444); border-radius: 7px; }
      .splash-pan-loader__shadow {
        position: relative; top: 15%; left: 15%; width: 30%; height: 5px;
        background: #E8E8E0; border-radius: 20px;
        animation: splash-pan-shadow 2s infinite;
      }
      @keyframes splash-pan-flip {
        0%   { width: 10%; transform: rotate(0deg); }
        10%  { left: 0%; transform: rotate(0deg); }
        20%  { width: 0%; left: 20%; }
        30%  { width: 25%; }
        50%  { left: 15%; width: 35%; }
        70%  { width: 30%; left: 18%; transform: rotate(240deg); }
        90%  { width: 30%; left: 10%; }
        100% { width: 2%; left: 25%; transform: rotate(360deg); }
      }
      @keyframes splash-pan-pan {
        0%   { transform: rotate(0deg); transform-origin: top right; }
        10%  { transform: rotate(-2deg); transform-origin: top right; }
        50%  { transform: rotate(15deg); }
        100% { transform: rotate(0deg); }
      }
      @keyframes splash-pan-shadow {
        0%   { width: 30%; }
        50%  { width: 40%; left: 20px; }
        100% { width: 30%; }
      }

      .splash-title {
        font-family: 'Playfair Display', serif; font-size: 1.9rem; color: #2D1B12;
        margin: 0;
      }
      .splash-text { color: #8A6552; font-size: .92rem; margin: 0; }
    </style>
  </body>
</html>
